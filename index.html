<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <!-- LOGO -->
            <div class="logo">
                <img src="./logo.png" alt="logo" width="100px">
            </div>
            <!-- MENU ICON -->
            <div class="menu-icon" onclick="toggleMenu()">
                ☰
            </div>
            <!-- MENU -->
            <ul class="menu" id="menu">
                <li class="active" onclick="toggleMenu(),changeOptionStyle(this),loadPage('home')">Home</li>
                <li onclick="toggleMenu(),changeOptionStyle(this),loadPage('menu')">Menu</li>
                <li onclick="toggleMenu(),changeOptionStyle(this),loadPage('service')">Service</li>
                <li onclick="toggleMenu(),changeOptionStyle(this),loadPage('about')">About Us</li>
            </ul>
        </nav>
    </header>
    <main id="main-content">
    </main>
    <script src="main.js"></script>
</body>
</html>
